<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Viewer — Adil Tirur</title>
  <meta name="description" content="Upload a SurveyJS JSON and preview it interactively." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared.css" />

  <!-- Anti-FOUC -->
  <script>
    (function () {
      var t = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>

  <style>
    body {
      line-height: 1.6;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Page header ── */
    .page-header {
      padding: 0 32px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--surface);
    }
    .page-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-breadcrumb {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .page-breadcrumb .sep { color: var(--border); }
    .page-breadcrumb .current { color: var(--fg); }
    .survey-name-badge {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 2px 10px;
      border-radius: 4px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .survey-name-badge.empty {
      background: var(--surface-2);
      border-color: var(--border);
      color: var(--muted);
    }

    /* ── Buttons ── */
    .btn {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      padding: 6px 13px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .btn.btn-primary {
      background: var(--btn-p-bg);
      color: var(--btn-p-fg);
      border-color: var(--btn-p-bg);
    }
    .btn.btn-primary:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.35; pointer-events: none; }

    /* ── Main layout ── */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 232px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sidebar-title::before {
      content: '';
      display: inline-block;
      width: 12px;
      height: 1px;
      background: var(--accent);
    }
    .sidebar-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }
    .pages-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .page-item {
      display: flex;
      align-items: flex-start;
      padding: 7px 12px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.12s;
      gap: 8px;
    }
    .page-item:hover { background: var(--surface-2); }
    .page-item.active {
      background: var(--accent-dim);
      border-left-color: var(--accent);
    }
    .page-item.active .page-item-name { color: var(--accent); font-weight: 500; }
    .page-item.hidden-page { opacity: 0.45; }
    .page-item-num {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      min-width: 18px;
      padding-top: 1px;
    }
    .page-item-info { flex: 1; min-width: 0; }
    .page-item-name {
      font-size: 11px;
      color: var(--fg);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .page-item-qcount {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      margin-top: 1px;
    }
    .page-item-matches { margin-top: 4px; display: flex; flex-direction: column; gap: 2px; }
    .page-item-match {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .page-item-match-icon { flex-shrink: 0; opacity: 0.6; }
    .page-item-match-text { overflow: hidden; text-overflow: ellipsis; }
    .page-item-match-more {
      font-size: 8px;
      color: var(--accent);
      margin-top: 2px;
      font-family: var(--mono);
    }

    /* ── Sidebar search ── */
    .sidebar-search {
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-search-wrap { position: relative; display: flex; align-items: center; }
    .sidebar-search-wrap svg {
      position: absolute; left: 7px; width: 11px; height: 11px;
      color: var(--muted); pointer-events: none; flex-shrink: 0;
    }
    .sidebar-search input {
      width: 100%;
      font-family: var(--mono);
      font-size: 10px;
      padding: 5px 24px 5px 24px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface-2);
      color: var(--fg);
      outline: none;
      transition: border-color 0.15s;
    }
    .sidebar-search input:focus { border-color: var(--accent); }
    .sidebar-search input::placeholder { color: var(--muted); opacity: 0.6; }
    .sidebar-search-clear {
      position: absolute; right: 5px; background: none; border: none;
      cursor: pointer; color: var(--muted); font-size: 13px; line-height: 1;
      padding: 1px 3px; border-radius: 3px; display: none;
    }
    .sidebar-search-clear:hover { color: var(--fg); }
    .sidebar-search-clear.visible { display: block; }

    mark {
      background: #fef08a; color: #111; border-radius: 2px; padding: 0 1px;
      font-style: normal;
    }
    [data-theme="dark"] mark { background: #713f12; color: #fef9c3; }

    .search-empty {
      padding: 20px 14px; text-align: center;
      font-size: 10px; color: var(--muted); font-family: var(--mono);
    }

    /* ── Content area ── */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      background: var(--bg);
    }

    /* ── Empty / upload state ── */
    .upload-state {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      color: var(--muted);
    }
    .upload-icon { font-size: 36px; margin-bottom: 14px; }
    .upload-state h2 { font-size: 15px; font-weight: 500; color: var(--fg); margin-bottom: 6px; }
    .upload-state p { font-size: 12px; margin-bottom: 18px; }
    .upload-drop-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 44px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      max-width: 380px;
    }
    .upload-drop-area:hover, .upload-drop-area.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .upload-drop-area input { display: none; }

    /* ── Page viewer ── */
    .page-viewer-header { margin-bottom: 22px; }
    .page-viewer-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 9px;
    }
    .page-viewer-badge::before {
      content: '';
      display: inline-block;
      width: 14px;
      height: 1px;
      background: var(--accent);
    }
    .page-viewer-title {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .page-viewer-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 6px;
    }
    .page-viewer-meta span { display: flex; align-items: center; gap: 4px; }
    .page-viewer-desc { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.6; }
    .page-viewer-condition {
      font-family: var(--mono);
      font-size: 10px;
      background: rgba(250, 200, 0, 0.1);
      color: #d97706;
      border: 1px solid rgba(250, 200, 0, 0.25);
      border-radius: 5px;
      padding: 4px 10px;
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    [data-theme="dark"] .page-viewer-condition { background: #2d1f00; color: #fcd34d; border-color: #6b3f00; }

    /* ── Questions list ── */
    .questions-list { display: flex; flex-direction: column; gap: 12px; margin-top: 18px; }
    .question-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 16px;
      transition: border-color 0.15s;
    }
    .question-row:hover { border-color: var(--accent); }
    .question-row-header { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 5px; }
    .q-type {
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .q-type-radio { background: #ede9fe; color: #7c3aed; }
    .q-type-check { background: #fef3c7; color: #d97706; }
    .q-type-text  { background: var(--accent-dim); color: var(--accent); }
    [data-theme="dark"] .q-type-radio { background: #2d1b69; color: #a78bfa; }
    [data-theme="dark"] .q-type-check { background: #3d2600; color: #fbbf24; }
    .q-name { font-family: var(--mono); font-size: 9px; color: var(--muted); flex-shrink: 0; margin-top: 3px; }
    .q-title { font-size: 12px; font-weight: 500; line-height: 1.5; flex: 1; }
    .q-required { color: #ef4444; margin-left: 3px; font-size: 11px; }
    .q-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
    .q-tag {
      font-family: var(--mono);
      font-size: 9px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 1px 7px;
      border-radius: 4px;
      color: var(--muted);
    }
    .q-choices { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 5px; }
    .q-choice-pill {
      font-size: 10px;
      padding: 2px 9px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
    }
    .q-choices-more { font-size: 10px; color: var(--muted); padding: 2px 7px; }
    .q-visibleif {
      font-family: var(--mono);
      font-size: 9px;
      color: #d97706;
      background: rgba(250, 200, 0, 0.1);
      border: 1px solid rgba(250, 200, 0, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 5px;
      display: inline-block;
    }
    [data-theme="dark"] .q-visibleif { background: #2d1f00; color: #fcd34d; border-color: #6b3f00; }
    .no-questions { color: var(--muted); font-size: 12px; padding: 10px 0; font-style: italic; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--fg); color: var(--bg);
      padding: 9px 16px; border-radius: 7px;
      font-size: 12px; font-family: var(--mono);
      z-index: 9999;
      transform: translateY(60px); opacity: 0;
      transition: all 0.25s; pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── Import modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: min(580px, 94vw);
      padding: 24px;
      transform: translateY(10px);
      transition: transform 0.2s;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .modal-title { font-size: 14px; font-weight: 600; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 18px; line-height: 1;
      padding: 2px 6px; border-radius: 4px;
    }
    .modal-close:hover { color: var(--fg); background: var(--surface-2); }
    .modal textarea {
      width: 100%; height: 240px;
      font-family: var(--mono); font-size: 11px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--fg);
      resize: vertical; outline: none;
      transition: border-color 0.15s;
    }
    .modal textarea:focus { border-color: var(--accent); }
    .modal-footer { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
    .field-label {
      font-size: 10px; font-weight: 500; color: var(--muted);
      margin-bottom: 5px; display: block;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* ── Preview overlay ── */
    .preview-overlay {
      position: fixed; inset: 0;
      background: var(--bg); z-index: 2000;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .preview-overlay.open { opacity: 1; pointer-events: all; }
    .preview-topbar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 14px;
      padding: 0 28px; height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .preview-title {
      font-size: 13px; font-weight: 600; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .preview-progress-label {
      font-family: var(--mono); font-size: 10px; color: var(--muted); flex-shrink: 0;
    }
    .preview-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 18px; line-height: 1;
      padding: 4px 8px; border-radius: 6px;
      flex-shrink: 0; transition: color 0.15s;
    }
    .preview-close:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
    [data-theme="dark"] .preview-close:hover { color: #ff7b72; background: #3d1414; }
    .preview-progress-bar-wrap { flex-shrink: 0; height: 2px; background: var(--border); }
    .preview-progress-bar { height: 100%; background: var(--accent); transition: width 0.3s ease; }
    .preview-body {
      flex: 1; overflow-y: auto;
      display: flex; justify-content: center;
      padding: 36px 20px 120px;
    }
    .preview-content { width: 100%; max-width: 620px; }
    .preview-page-tag {
      font-family: var(--mono); font-size: 10px; color: var(--accent);
      display: flex; align-items: center; gap: 7px; margin-bottom: 11px;
    }
    .preview-page-tag::before {
      content: ''; display: inline-block; width: 14px; height: 1px; background: var(--accent);
    }
    .preview-page-title {
      font-size: 21px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 5px;
    }
    .preview-page-desc { color: var(--muted); font-size: 13px; margin-bottom: 28px; line-height: 1.6; }
    .preview-questions { display: flex; flex-direction: column; gap: 26px; }
    .pq { animation: fadeUp 0.2s ease; }
    .pq-title { font-size: 14px; font-weight: 500; line-height: 1.5; margin-bottom: 4px; }
    .pq-required { color: #ef4444; margin-left: 3px; }
    .pq-desc { font-size: 12px; color: var(--muted); margin-bottom: 11px; }
    .pq-choices { display: flex; flex-direction: column; gap: 7px; }
    .pq-choice {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 9px 13px;
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer; transition: all 0.12s; user-select: none;
    }
    .pq-choice:hover { border-color: var(--accent); background: var(--accent-dim); }
    .pq-choice.selected { border-color: var(--accent); background: var(--accent-dim); }
    .pq-choice input[type="radio"], .pq-choice input[type="checkbox"] {
      width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px;
      accent-color: var(--accent); cursor: pointer;
    }
    .pq-choice-label { font-size: 13px; line-height: 1.4; }
    .pq input[type="text"], .pq input[type="date"], .pq input[type="datetime-local"],
    .pq input[type="number"], .pq input[type="email"], .pq input[type="tel"] {
      width: 100%; padding: 9px 13px;
      border: 1px solid var(--border); border-radius: 7px;
      font-family: var(--sans); font-size: 13px; color: var(--fg);
      background: var(--surface); outline: none; transition: border-color 0.15s;
    }
    .pq input:focus { border-color: var(--accent); }
    .pq-range-wrap { display: flex; flex-direction: column; gap: 7px; }
    .pq-range-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
    .pq-range-value {
      text-align: center; font-family: var(--mono); font-size: 12px;
      color: var(--accent); font-weight: 500;
    }
    .pq input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .pq-other-input {
      margin-top: 7px; padding: 9px 13px;
      border: 1px solid var(--border); border-radius: 7px;
      width: 100%; font-family: var(--sans); font-size: 13px;
      background: var(--surface); color: var(--fg);
      outline: none; transition: border-color 0.15s;
    }
    .pq-other-input:focus { border-color: var(--accent); }
    .preview-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 2001;
    }
    .preview-footer-center {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
    }
    .preview-complete { text-align: center; padding: 60px 24px; }
    .preview-complete-icon { font-size: 44px; margin-bottom: 14px; }
    .preview-complete h2 { font-size: 20px; font-weight: 600; margin-bottom: 7px; }
    .preview-complete p { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<script src="/nav.js"></script>
<script src="/i18n.js"></script>
<site-nav></site-nav>

<!-- ── Header ── -->
<div class="page-header">
  <div class="page-header-left">
    <div class="page-breadcrumb">
      <span data-i18n="survey.header.breadcrumb_root">adiltirur.dev</span>
      <span class="sep">/</span>
      <span class="current" data-i18n="survey.header.breadcrumb_page">survey_preview</span>
    </div>
    <div class="survey-name-badge empty" id="surveyNameBadge" data-i18n="survey.header.badge_empty">no file loaded</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="shareFeedback" style="font-family:var(--mono);font-size:10px;color:var(--accent);opacity:0;transition:opacity 0.3s;pointer-events:none;" data-i18n="survey.header.feedback_share">Link copied!</span>
    <button class="btn" id="shareLinkBtn" onclick="copyShareLink()" disabled title="Copy shareable link to this survey" data-i18n="survey.header.btn_share">🔗 Copy Link</button>
    <button class="btn" onclick="openImport()" data-i18n="survey.header.btn_upload">⬆ Upload JSON</button>
    <button class="btn btn-primary" id="previewBtn" onclick="openPreview()" disabled data-i18n="survey.header.btn_preview">▶ Preview</button>
  </div>
</div>

<!-- ── Main layout ── -->
<div class="main-layout">

  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title" data-i18n="survey.sidebar.title">Pages</div>
      <div class="sidebar-count" id="sidebarCount">—</div>
    </div>
    <div class="sidebar-search">
      <div class="sidebar-search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="sidebarSearch" placeholder="search pages & questions…"
               data-i18n-attr="placeholder:survey.sidebar.search_placeholder"
               oninput="filterSidebar(this.value)"
               onkeydown="if(event.key==='Escape'){clearSearch();}" />
        <button class="sidebar-search-clear" id="searchClearBtn" onclick="clearSearch()" title="Clear search">×</button>
      </div>
    </div>
    <div class="pages-list" id="pagesList"></div>
  </div>

  <div class="content-area" id="contentArea">
    <div class="upload-state" id="uploadState">
      <div class="upload-icon">📋</div>
      <h2 data-i18n="survey.upload_state.heading">No survey loaded</h2>
      <p data-i18n="survey.upload_state.body">Upload a SurveyJS-compatible JSON file to browse pages and preview the survey.</p>
      <div class="upload-drop-area" id="dropArea" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".json,application/json" onchange="handleFileInput(this)" />
        <div style="font-size:22px;margin-bottom:7px;" data-i18n="survey.upload_state.drop_icon">⬆</div>
        <div style="font-size:12px;color:var(--muted)" data-i18n="survey.upload_state.drop_label">Click to choose a .json file<br>or drag and drop here</div>
      </div>
      <div style="font-size:11px;color:var(--muted)"><span data-i18n="survey.upload_state.paste_prefix">or </span><a href="#" onclick="openImport();return false;" style="color:var(--accent);" data-i18n="survey.upload_state.paste_link">paste JSON directly</a></div>
    </div>
    <div id="pageViewerArea" style="display:none;"></div>
  </div>

</div>

<!-- ── Import modal ── -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" data-i18n="survey.import_modal.title">Paste Survey JSON</div>
      <button class="modal-close" onclick="closeImport()">×</button>
    </div>
    <label class="field-label" data-i18n="survey.import_modal.field_label">SurveyJS-compatible JSON</label>
    <textarea id="importInput" placeholder='{"title": "My Survey", "pages": [...]}'
              data-i18n-attr='placeholder:survey.import_modal.placeholder'></textarea>
    <div class="modal-footer">
      <button class="btn" onclick="closeImport()" data-i18n="survey.import_modal.btn_cancel">Cancel</button>
      <button class="btn btn-primary" onclick="doImport()" data-i18n="survey.import_modal.btn_load">Load</button>
    </div>
  </div>
</div>

<!-- ── Preview overlay ── -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-topbar">
    <div class="preview-title" id="previewTitleBar"></div>
    <div class="preview-progress-label" id="previewProgressLabel"></div>
    <button class="preview-close" onclick="closePreview()" title="Close preview">✕</button>
  </div>
  <div class="preview-progress-bar-wrap">
    <div class="preview-progress-bar" id="previewProgressBar" style="width:0%"></div>
  </div>
  <div class="preview-body">
    <div class="preview-content" id="previewContent"></div>
  </div>
  <div class="preview-footer">
    <button class="btn" id="previewBackBtn" onclick="previewBack()" data-i18n="survey.preview.btn_back">← Back</button>
    <div class="preview-footer-center" id="previewFooterCenter"></div>
    <button class="btn btn-primary" id="previewNextBtn" onclick="previewNext()" data-i18n="survey.preview.btn_next">Next →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let survey      = null;   // parsed SurveyJS JSON
let pageIdx     = null;   // currently selected page index in sidebar
let searchQuery = '';     // current sidebar search string

// ── Helpers ───────────────────────────────────────────────────────────────────
function toast(msg, ms = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Strip ${...} metadata (handles brackets inside)
function stripMeta(str) {
  if (str == null) return '';
  let s = String(str), prev;
  do { prev = s; s = s.replace(/\$\{[^${}]*(?:\{[^{}]*\}[^${}]*)?\}/g, ''); }
  while (s !== prev);
  return s.trim();
}

function surveyTitle(s) {
  if (!s || !s.title) return 'Untitled Survey';
  const t = s.title;
  return stripMeta(typeof t === 'object' ? (t.de || t.default || '') : t);
}

// ── Load survey ───────────────────────────────────────────────────────────────
function loadSurvey(data, name) {
  survey = data;
  pageIdx = data.pages && data.pages.length > 0 ? 0 : null;

  const badge = document.getElementById('surveyNameBadge');
  badge.textContent = name || surveyTitle(data);
  badge.classList.remove('empty');
  document.getElementById('previewBtn').disabled = false;
  document.getElementById('shareLinkBtn').disabled = false;
  document.getElementById('uploadState').style.display = 'none';
  document.getElementById('pageViewerArea').style.display = '';

  renderSidebar();
  renderPageViewer();
  toast('Survey loaded — ' + (data.pages || []).length + ' pages');
}

// ── Search helpers ────────────────────────────────────────────────────────────
function filterSidebar(q) {
  searchQuery = q.trim().toLowerCase();
  const clearBtn = document.getElementById('searchClearBtn');
  if (clearBtn) clearBtn.classList.toggle('visible', searchQuery.length > 0);
  renderSidebar();
}

function clearSearch() {
  searchQuery = '';
  const inp = document.getElementById('sidebarSearch');
  if (inp) inp.value = '';
  const clearBtn = document.getElementById('searchClearBtn');
  if (clearBtn) clearBtn.classList.remove('visible');
  renderSidebar();
}

// Highlight all occurrences of q in text (case-insensitive), returning HTML
function hlText(text, q) {
  if (!q) return esc(text);
  const s = String(text || '');
  const lower = s.toLowerCase();
  let result = '', pos = 0;
  let idx;
  while ((idx = lower.indexOf(q, pos)) !== -1) {
    result += esc(s.slice(pos, idx));
    result += '<mark>' + esc(s.slice(idx, idx + q.length)) + '</mark>';
    pos = idx + q.length;
  }
  result += esc(s.slice(pos));
  return result;
}

function matchesQuery(text, q) {
  return String(text || '').toLowerCase().includes(q);
}

// Collect all searchable hits within a page for a given query
function pageSearchHits(pg, q) {
  const hits = [];
  for (const el of (pg.elements || [])) {
    const elTitle = el.title || el.name || '';
    if (matchesQuery(elTitle, q)) {
      hits.push({ icon: '❓', text: elTitle });
      continue; // if question title matched, don't also show its choices
    }
    // search choices
    for (const c of (el.choices || [])) {
      const cText = typeof c === 'string' ? c : (c.text || c.value || '');
      if (matchesQuery(cText, q)) {
        hits.push({ icon: '○', text: cText });
        break; // one hit per question from choices
      }
    }
  }
  return hits;
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const pages = (survey && survey.pages) || [];
  const q = searchQuery;

  if (!q) {
    // ── Normal (no search) ─────────────────────────────────────────────────
    document.getElementById('sidebarCount').textContent =
      pages.length + ' page' + (pages.length !== 1 ? 's' : '');

    document.getElementById('pagesList').innerHTML = pages.length === 0
      ? '<div style="padding:14px;text-align:center;color:var(--muted);font-size:11px;">No pages</div>'
      : pages.map((pg, i) => {
          const title = pg.title || pg.name || 'Untitled page';
          const qCount = (pg.elements || []).length;
          const hasCond = !!pg.visibleIf;
          return `
            <div class="page-item ${i === pageIdx ? 'active' : ''} ${hasCond ? 'hidden-page' : ''}"
                 onclick="selectPage(${i})">
              <span class="page-item-num">${i + 1}</span>
              <div class="page-item-info">
                <div class="page-item-name" title="${esc(title)}">${esc(title)}</div>
                <div class="page-item-qcount">${qCount} question${qCount !== 1 ? 's' : ''}${hasCond ? ' · conditional' : ''}</div>
              </div>
            </div>`;
        }).join('');
    return;
  }

  // ── Search mode ────────────────────────────────────────────────────────────
  const results = [];
  for (let i = 0; i < pages.length; i++) {
    const pg = pages[i];
    const pageTitle = pg.title || pg.name || 'Untitled page';
    const pageTitleMatches = matchesQuery(pageTitle, q);
    const hits = pageSearchHits(pg, q);
    if (pageTitleMatches || hits.length > 0) {
      results.push({ pg, i, pageTitle, pageTitleMatches, hits });
    }
  }

  const matchCount = results.reduce((n, r) => n + (r.pageTitleMatches ? 1 : 0) + r.hits.length, 0);
  document.getElementById('sidebarCount').textContent =
    results.length + ' page' + (results.length !== 1 ? 's' : '') +
    ', ' + matchCount + ' match' + (matchCount !== 1 ? 'es' : '');

  if (results.length === 0) {
    document.getElementById('pagesList').innerHTML =
      `<div class="search-empty">no results for<br>"${esc(q)}"</div>`;
    return;
  }

  const MAX_SNIPPETS = 4;
  document.getElementById('pagesList').innerHTML = results.map(({ pg, i, pageTitle, pageTitleMatches, hits }) => {
    const hasCond = !!pg.visibleIf;
    const snippets = hits.slice(0, MAX_SNIPPETS).map(h =>
      `<span class="page-item-match">
        <span class="page-item-match-icon">${h.icon}</span>
        <span class="page-item-match-text">${hlText(h.text, q)}</span>
      </span>`).join('');
    const moreCount = hits.length - MAX_SNIPPETS;
    const moreHtml  = moreCount > 0
      ? `<span class="page-item-match-more">+${moreCount} more match${moreCount !== 1 ? 'es' : ''}</span>`
      : '';

    return `
      <div class="page-item ${i === pageIdx ? 'active' : ''} ${hasCond ? 'hidden-page' : ''}"
           onclick="selectPage(${i})">
        <span class="page-item-num">${i + 1}</span>
        <div class="page-item-info">
          <div class="page-item-name" title="${esc(pageTitle)}">${hlText(pageTitle, q)}</div>
          <div class="page-item-qcount">
            ${(pg.elements || []).length} question${(pg.elements || []).length !== 1 ? 's' : ''}${hasCond ? ' · conditional' : ''}
          </div>
          ${snippets || moreHtml ? `<div class="page-item-matches">${snippets}${moreHtml}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function selectPage(i) {
  pageIdx = i;
  renderSidebar();
  renderPageViewer();
  document.getElementById('contentArea').scrollTop = 0;
}

// ── Page viewer (read-only) ───────────────────────────────────────────────────
function renderPageViewer() {
  const container = document.getElementById('pageViewerArea');
  if (!survey || pageIdx === null) { container.innerHTML = ''; return; }

  const pg = survey.pages[pageIdx];
  const title = pg.title || pg.name || '';
  const desc  = pg.description || '';
  const els   = pg.elements || [];

  const condHtml = pg.visibleIf
    ? `<div class="page-viewer-condition">⚡ visible if: ${esc(pg.visibleIf)}</div>`
    : '';

  const questionsHtml = els.length === 0
    ? '<p class="no-questions">No questions on this page.</p>'
    : els.map(el => renderQuestionRow(el)).join('');

  container.innerHTML = `
    <div class="page-viewer-header">
      <div class="page-viewer-badge">page ${pageIdx + 1} of ${survey.pages.length}</div>
      ${title ? `<h2 class="page-viewer-title">${esc(title)}</h2>` : ''}
      <div class="page-viewer-meta">
        <span>🏷 ${esc(pg.name || '')}</span>
        <span>❓ ${els.length} question${els.length !== 1 ? 's' : ''}</span>
      </div>
      ${desc ? `<p class="page-viewer-desc">${esc(desc)}</p>` : ''}
      ${condHtml}
    </div>
    <div class="questions-list">${questionsHtml}</div>
  `;
}

function renderQuestionRow(el) {
  const typeClass = el.type === 'radiogroup' ? 'q-type-radio' : el.type === 'checkbox' ? 'q-type-check' : 'q-type-text';
  const title = el.title || el.name || '';
  const req   = el.isRequired ? '<span class="q-required">*</span>' : '';

  const choices = (el.choices || []).slice(0, 8).map(c => {
    const label = typeof c === 'string' ? c : (c.text || c.value || '');
    return `<span class="q-choice-pill">${esc(label)}</span>`;
  }).join('');
  const moreCount = (el.choices || []).length - 8;
  const moreHtml  = moreCount > 0 ? `<span class="q-choices-more">+${moreCount} more</span>` : '';
  const choicesHtml = (el.type === 'radiogroup' || el.type === 'checkbox') && el.choices
    ? `<div class="q-choices">${choices}${moreHtml}</div>` : '';

  const tags = [];
  if (el.inputType && el.inputType !== 'text') tags.push(el.inputType);
  if (el.maxLength) tags.push(`max ${el.maxLength} chars`);
  if (el.showNoneItem) tags.push('none item');
  if (el.showOtherItem || el.otherText) tags.push('other item');
  const tagsHtml = tags.length ? `<div class="q-meta">${tags.map(t => `<span class="q-tag">${esc(t)}</span>`).join('')}</div>` : '';

  const condHtml = el.visibleIf
    ? `<div class="q-visibleif">⚡ ${esc(el.visibleIf)}</div>` : '';

  return `
    <div class="question-row">
      <div class="question-row-header">
        <span class="q-type ${typeClass}">${el.type}</span>
        <div class="q-title">${esc(title)}${req}</div>
        <span class="q-name">${esc(el.name || '')}</span>
      </div>
      ${tagsHtml}${choicesHtml}${condHtml}
    </div>`;
}

// ── File input & drag-drop ────────────────────────────────────────────────────
function handleFileInput(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      loadSurvey(data, file.name);
    } catch(err) { alert('Invalid JSON: ' + err.message); }
  };
  reader.readAsText(file);
}

const dropArea = document.getElementById('dropArea');
dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
dropArea.addEventListener('drop', e => {
  e.preventDefault(); dropArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { loadSurvey(JSON.parse(ev.target.result), file.name); }
    catch(err) { alert('Invalid JSON: ' + err.message); }
  };
  reader.readAsText(file);
});

// ── Paste import modal ────────────────────────────────────────────────────────
function openImport() {
  document.getElementById('importModal').classList.add('open');
  document.getElementById('importInput').value = '';
  setTimeout(() => document.getElementById('importInput').focus(), 80);
}
function closeImport() { document.getElementById('importModal').classList.remove('open'); }
function doImport() {
  const raw = document.getElementById('importInput').value.trim();
  if (!raw) return;
  try { loadSurvey(JSON.parse(raw), 'pasted JSON'); closeImport(); }
  catch(e) { alert('Invalid JSON: ' + e.message); }
}

// ══════════════════════════════════════════════════════════════════════════════
// ── VisibleIf parser
// Tokenises a raw SurveyJS visibleIf string into a structured array of clauses:
//   [{question, condition, values:[], logicalOperator:'and'|'or'|null}, ...]
// ══════════════════════════════════════════════════════════════════════════════
function parseVisibleIf(expr) {
  if (!expr || !expr.trim()) return [];
  const toks = _viTok(expr);
  const out  = [];
  let i = 0;
  while (i < toks.length) {
    // expect {var}
    if (toks[i].t !== 'var') { i++; continue; }
    const question = toks[i++].v;
    if (i >= toks.length) break;
    const condition = toks[i++].v.toLowerCase();
    // values (absent for notempty / empty)
    let values = [];
    if (condition !== 'notempty' && condition !== 'empty') {
      if (i < toks.length && toks[i].t !== 'logical' && toks[i].t !== 'var') {
        values = [toks[i++].v];
      }
    }
    // optional logical operator (and / or)
    let logicalOperator = null;
    if (i < toks.length && toks[i].t === 'logical') {
      logicalOperator = toks[i++].v.toLowerCase();
    }
    out.push({ question, condition, values, logicalOperator });
  }
  return out;
}

function _viTok(expr) {
  const toks = [];
  let i = 0;
  while (i < expr.length) {
    while (i < expr.length && /\s/.test(expr[i])) i++;
    if (i >= expr.length) break;
    const ch = expr[i];
    if (ch === '{') {
      const j = expr.indexOf('}', i);
      toks.push({ t: 'var', v: expr.slice(i + 1, j < 0 ? expr.length : j) });
      i = j < 0 ? expr.length : j + 1;
    } else if (ch === "'" || ch === '"') {
      let j = i + 1;
      while (j < expr.length && expr[j] !== ch) j++;
      toks.push({ t: 'str', v: expr.slice(i + 1, j) });
      i = j + 1;
    } else if ('=!<>'.includes(ch)) {
      const two = expr.slice(i, i + 2);
      if (two === '==' || two === '!=' || two === '>=' || two === '<=') {
        toks.push({ t: 'op', v: two }); i += 2;
      } else {
        toks.push({ t: 'op', v: ch }); i++;
      }
    } else {
      let j = i;
      while (j < expr.length && !/[\s{'"=!<>]/.test(expr[j])) j++;
      const w = expr.slice(i, j);
      const wl = w.toLowerCase();
      toks.push({ t: (wl === 'and' || wl === 'or') ? 'logical' : 'op', v: w });
      i = j;
    }
  }
  return toks;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── VisibleIf evaluator — matches the Dart production implementation exactly:
//   • Unanswered question → skip clause (don't fail it)
//   • All comparisons are case-insensitive
//   • logicalOperator is the connector AFTER the current clause (left-associative)
// ══════════════════════════════════════════════════════════════════════════════
function evalVisibleIf(clauses, answers) {
  let result = false;
  let lastOp  = null;   // 'and' | 'or' | null (null = first clause)

  for (const c of clauses) {
    const raw = answers[c.question];

    // No answer yet → skip this clause entirely (Dart: continue)
    if (raw === undefined || raw === null) continue;

    // Normalise to lowercase string array
    const aList = (Array.isArray(raw) ? raw : [raw])
      .map(a => String(a).trim().toLowerCase());
    const vList = c.values.map(v => String(v).trim().toLowerCase());

    let met = false;
    switch (c.condition) {
      case '=': case '==': case 'anyof':
        met = aList.some(a => vList.includes(a)); break;
      case '!=':
        met = !aList.some(a => vList.includes(a)); break;
      case 'notempty':
        met = aList.some(a => a !== ''); break;
      case 'empty':
        met = aList.every(a => a === ''); break;
      case 'contains':
        // Dart: any answer exactly equals any value
        met = aList.some(a => vList.some(v => a === v)); break;
      case 'notcontains':
        // Dart: every answer doesn't contain any value as substring
        met = aList.every(a => vList.every(v => !a.includes(v))); break;
      default: met = true;
    }

    if      (lastOp === 'and') result = result && met;
    else if (lastOp === 'or')  result = result || met;
    else                        result = met;   // first clause

    lastOp = c.logicalOperator;
  }
  return result;
}

// Convenience wrappers
function pageVisible(page, answers) {
  if (!page.visibleIf) return true;   // no condition → always visible
  return evalVisibleIf(parseVisibleIf(page.visibleIf), answers);
}
function elementVisible(el, answers) {
  if (!el.visibleIf) return true;
  return evalVisibleIf(parseVisibleIf(el.visibleIf), answers);
}

// ══════════════════════════════════════════════════════════════════════════════
// ── Preview runner
// ══════════════════════════════════════════════════════════════════════════════
let pvState = null;
// pvState = { snap, answers, pageIdx, history:[], answeredPages: Set }

function openPreview() {
  if (!survey) return;
  const pages = survey.pages || [];
  if (!pages.length) { toast('No pages.'); return; }
  pvState = { snap: survey, answers: {}, pageIdx: 0, history: [], answeredPages: new Set() };
  // Page 0 is the unconditional entry point (no visibleIf required)
  pvState.pageIdx = 0;
  _pvRender();
  document.getElementById('previewOverlay').classList.add('open');
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('open');
  pvState = null;
}

// Scan ALL pages from the start (like Dart's findNextPageIndex):
// Return first page where visibleIf passes AND not yet in answeredPages.
// excludeIdx: treat this index as already answered (used for isLast check).
function _pvFindNext(excludeIdx = -1) {
  const pages = pvState.snap.pages || [];
  for (let i = 0; i < pages.length; i++) {
    if (!pageVisible(pages[i], pvState.answers)) continue;   // visibleIf not met
    if (pvState.answeredPages.has(i))            continue;   // already answered
    if (i === excludeIdx)                        continue;   // treat as answered
    const els = pages[i].elements || [];
    if (els.length === 0) return i;                          // empty page, ok
    return i;
  }
  return -1; // survey complete
}

function _pvVisEls(page) {
  return (page.elements || []).filter(el => elementVisible(el, pvState.answers));
}

function _pvRender() {
  const pages = pvState.snap.pages || [];
  const idx   = pvState.pageIdx;
  const page  = pages[idx];
  const total = pages.length;

  // isLast: are there any pages after this one that haven't been answered yet?
  // We check structurally (ignoring conditions) so the button doesn't flip
  // mid-page just because answers haven't been entered yet.
  const isLast = pages.slice(idx + 1).every((_, j) => pvState.answeredPages.has(idx + 1 + j));

  // Progress — count how many pages are done vs total visible
  const done = pvState.answeredPages.size;
  const pct  = total > 1 ? Math.round((done / (total - 1)) * 100) : 0;
  document.getElementById('previewProgressBar').style.width = Math.min(pct, 99) + '%';
  document.getElementById('previewProgressLabel').textContent =
    `${done + 1} / ~${total}`;

  document.getElementById('previewTitleBar').textContent =
    surveyTitle(pvState.snap) || 'Survey Preview';

  document.getElementById('previewBackBtn').disabled = pvState.history.length === 0;
  document.getElementById('previewNextBtn').style.display = '';
  document.getElementById('previewNextBtn').textContent = isLast ? 'Submit ✓' : 'Next →';

  const els = _pvVisEls(page);
  document.getElementById('previewFooterCenter').textContent =
    `${els.length} question${els.length !== 1 ? 's' : ''} on this page`;

  document.getElementById('previewContent').innerHTML = `
    <div class="preview-page-tag">${esc(stripMeta(page.name || ''))}</div>
    ${page.title       ? `<h2 class="preview-page-title">${esc(stripMeta(page.title))}</h2>`       : ''}
    ${page.description ? `<p class="preview-page-desc">${esc(stripMeta(page.description))}</p>` : ''}
    <div class="preview-questions">${els.map(el => _pvRenderQ(el)).join('')}</div>`;

  document.querySelector('.preview-body').scrollTop = 0;
  _pvRestoreAnswers(els);
}

function _pvRenderQ(el) {
  const title = stripMeta(el.title || el.name || '');
  const desc  = el.description ? stripMeta(el.description) : '';
  const req   = el.isRequired ? '<span class="pq-required">*</span>' : '';
  let body    = '';

  if (el.type === 'radiogroup' || el.type === 'checkbox') {
    const itype = el.type === 'radiogroup' ? 'radio' : 'checkbox';
    const choices = (el.choices || []).map(c =>
      typeof c === 'string' ? { value: c, text: c }
      : { value: String(c.value ?? ''), text: String(c.text ?? c.value ?? '') }
    );
    let items = choices.map(c => `
      <label class="pq-choice" data-val="${esc(c.value)}" onclick="pvToggle(this,'${el.name}','${el.type}')">
        <input type="${itype}" name="pv_${el.name}" value="${esc(stripMeta(c.value))}" style="pointer-events:none"/>
        <span class="pq-choice-label">${esc(stripMeta(c.text || c.value))}</span>
      </label>`).join('');
    if (el.showNoneItem)
      items += `<label class="pq-choice" data-val="__none__" onclick="pvToggle(this,'${el.name}','${el.type}')">
        <input type="${itype}" name="pv_${el.name}" value="__none__" style="pointer-events:none"/>
        <span class="pq-choice-label">${esc(stripMeta(el.noneText || 'None'))}</span></label>`;
    if (el.showOtherItem)
      items += `<label class="pq-choice" data-val="__other__" onclick="pvToggle(this,'${el.name}','${el.type}')">
        <input type="${itype}" name="pv_${el.name}" value="__other__" style="pointer-events:none"/>
        <span class="pq-choice-label">${esc(stripMeta(el.otherText || 'Other'))}</span></label>
        <input class="pq-other-input" id="pv_oth_${el.name}" type="text" style="display:none"
          placeholder="${esc(stripMeta(el.otherPlaceholder || ''))}"
          oninput="pvState.answers['${el.name}-Comment']=this.value"/>`;
    body = `<div class="pq-choices" id="pvc_${el.name}">${items}</div>`;

  } else if (el.type === 'text') {
    const it = el.inputType || 'text';
    const ph = esc(stripMeta(el.placeholder || ''));
    const ml = el.maxLength ? `maxlength="${el.maxLength}"` : '';
    if (it === 'range') {
      const mn = el.min ?? 0, mx = el.max ?? 100;
      body = `<div class="pq-range-wrap">
        <div class="pq-range-labels"><span>${mn}</span><span>${mx}</span></div>
        <input type="range" id="pv_${el.name}" min="${mn}" max="${mx}" value="${mn}"
          oninput="document.getElementById('pv_rv_${el.name}').textContent=this.value;pvState.answers['${el.name}']=this.value"/>
        <div class="pq-range-value" id="pv_rv_${el.name}">${mn}</div></div>`;
    } else {
      const minA = (el.min != null && el.min !== '') ? `min="${esc(String(el.min))}"` : '';
      const maxA = (el.max != null && el.max !== '') ? `max="${esc(String(el.max))}"` : '';
      body = `<input type="${it}" id="pv_${el.name}" placeholder="${ph}" ${ml} ${minA} ${maxA}
        oninput="pvState.answers['${el.name}']=this.value"/>`;
    }
  }
  return `<div class="pq" id="pv_q_${el.name}">
    <div class="pq-title">${esc(title)}${req}</div>
    ${desc ? `<div class="pq-desc">${esc(desc)}</div>` : ''}
    ${body}</div>`;
}

function _pvRestoreAnswers(els) {
  els.forEach(el => {
    const v = pvState.answers[el.name];
    if (v !== undefined) {
      if (el.type === 'radiogroup') {
        document.querySelectorAll(`#pvc_${el.name} .pq-choice`).forEach(l => {
          const on = l.dataset.val === v;
          l.classList.toggle('selected', on);
          l.querySelector('input').checked = on;
        });
      } else if (el.type === 'checkbox') {
        const vals = Array.isArray(v) ? v : [v];
        document.querySelectorAll(`#pvc_${el.name} .pq-choice`).forEach(l => {
          const on = vals.includes(l.dataset.val);
          l.classList.toggle('selected', on);
          l.querySelector('input').checked = on;
        });
      } else {
        const inp = document.getElementById('pv_' + el.name);
        if (inp) inp.value = v;
        const rv = document.getElementById('pv_rv_' + el.name);
        if (rv)  rv.textContent = v;
      }
    }
    const oi = document.getElementById('pv_oth_' + el.name);
    if (oi) {
      oi.value = pvState.answers[el.name + '-Comment'] || '';
      _pvOtherVis(el.name, el.type);
    }
  });
}

function pvToggle(lbl, name, type) {
  const val = lbl.dataset.val;
  if (type === 'radiogroup') {
    document.querySelectorAll(`#pvc_${name} .pq-choice`).forEach(l => {
      l.classList.remove('selected'); l.querySelector('input').checked = false;
    });
    lbl.classList.add('selected'); lbl.querySelector('input').checked = true;
    pvState.answers[name] = val;
  } else {
    const was = lbl.classList.contains('selected');
    lbl.classList.toggle('selected', !was); lbl.querySelector('input').checked = !was;
    const sel = [];
    document.querySelectorAll(`#pvc_${name} .pq-choice.selected`).forEach(l => sel.push(l.dataset.val));
    pvState.answers[name] = sel;
  }
  _pvOtherVis(name, type);
  _pvRefreshVis();
}

function _pvOtherVis(name, type) {
  const oi = document.getElementById('pv_oth_' + name); if (!oi) return;
  const a = pvState.answers[name];
  const show = type === 'radiogroup' ? a === '__other__' : (Array.isArray(a) && a.includes('__other__'));
  oi.style.display = show ? 'block' : 'none';
}

function _pvRefreshVis() {
  if (!pvState) return;
  const page = (pvState.snap.pages || [])[pvState.pageIdx]; if (!page) return;
  (page.elements || []).forEach(el => {
    const node = document.getElementById('pv_q_' + el.name); if (!node) return;
    node.style.display = elementVisible(el, pvState.answers) ? '' : 'none';
  });
  const vis = _pvVisEls(page).length;
  document.getElementById('previewFooterCenter').textContent =
    `${vis} question${vis !== 1 ? 's' : ''} on this page`;
}

function previewNext() {
  if (!pvState) return;
  // Mark current page answered, push to history, then find next
  pvState.answeredPages.add(pvState.pageIdx);
  pvState.history.push(pvState.pageIdx);

  const next = _pvFindNext();
  if (next === -1) {
    // Survey complete
    document.getElementById('previewContent').innerHTML = `
      <div class="preview-complete">
        <div class="preview-complete-icon">✅</div>
        <h2>Survey Complete</h2>
        <p>You have reached the end of the survey.<br>Close to return to the viewer.</p>
      </div>`;
    document.getElementById('previewNextBtn').style.display = 'none';
    document.getElementById('previewFooterCenter').textContent = '';
    document.getElementById('previewProgressBar').style.width = '100%';
    document.getElementById('previewProgressLabel').textContent = 'Done';
    return;
  }
  pvState.pageIdx = next;
  _pvRender();
}

function previewBack() {
  if (!pvState || !pvState.history.length) return;
  // Remove answers for the page we're leaving
  const pages = pvState.snap.pages || [];
  const leaving = pages[pvState.pageIdx];
  (leaving ? leaving.elements || [] : []).forEach(el => {
    delete pvState.answers[el.name];
    delete pvState.answers[el.name + '-Comment'];
  });
  pvState.answeredPages.delete(pvState.pageIdx);

  pvState.pageIdx = pvState.history.pop();
  document.getElementById('previewNextBtn').style.display = '';
  _pvRender();
}

// ── Share link ─────────────────────────────────────────────────────────────────
function _encodeContent(text) {
  try { return btoa(unescape(encodeURIComponent(text))); } catch(e) { return btoa(text); }
}
function _decodeContent(b64) {
  try { return decodeURIComponent(escape(atob(b64))); } catch(e) { return ''; }
}

function copyShareLink() {
  if (!survey) return;
  const json = JSON.stringify(survey);
  const url  = location.origin + '/survey.html#' + _encodeContent(json);
  navigator.clipboard.writeText(url).then(() => {
    const fb = document.getElementById('shareFeedback');
    fb.style.opacity = '1';
    setTimeout(() => fb.style.opacity = '0', 2000);
  });
  // Also update the address bar so the current tab is already "shareable"
  history.replaceState(null, '', '/survey.html#' + _encodeContent(json));
}

// ── Load from URL hash on page init ──────────────────────────────────────────
(function () {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const json = _decodeContent(hash);
  if (!json) return;
  try {
    const data = JSON.parse(json);
    // defer so the DOM is fully ready
    setTimeout(() => loadSurvey(data, surveyTitle(data) || 'Shared survey'), 0);
  } catch(e) {
    console.warn('survey.html: could not parse hash as JSON', e);
  }
})();

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePreview(); closeImport(); }
});
document.getElementById('importModal').addEventListener('click', e => {
  if (e.target === document.getElementById('importModal')) closeImport();
});
</script>
